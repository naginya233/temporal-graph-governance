services:
  governance-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: traffic-governance-web:latest
    container_name: traffic-governance-web
    ports:
      - "5000:5000"
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      FLASK_DEBUG: "0"
    volumes:
      - ./traffic_scene_validator/web_config.json:/app/traffic_scene_validator/web_config.json
      - ./traffic_scene_validator/governance_validation_index.json:/app/traffic_scene_validator/governance_validation_index.json
      - ./traffic_scene_validator/validation_index.json:/app/traffic_scene_validator/validation_index.json
      - ./traffic_agent_system/outputs:/app/traffic_agent_system/outputs
      - /data/mydata/datasets/20260328_migrate:/data/mydata/datasets/20260328_migrate:ro
    restart: unless-stopped

# If your datasets are on host machine, you can add mounts like below:
#      - d:/Research/Project2/infrastructure/data/infrastructure-side/scene_graph_results:/data/scene_graph_results:ro
#      - d:/Research/Project2/infrastructure/data/infrastructure-side/intersection_vis_results:/data/intersection_vis_results:ro
#      - d:/Research/Project2/traffic_dataset/traffic_dataset/frames:/data/frames:ro
