name: playwright-smoke

on:
  push:
    paths:
      - "traffic_scene_validator/**"
      - ".github/workflows/playwright-smoke.yml"
  pull_request:
    paths:
      - "traffic_scene_validator/**"
      - ".github/workflows/playwright-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: traffic_scene_validator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: traffic_scene_validator/package-lock.json

      - name: Install Node deps
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run smoke tests
        run: npm run test:e2e:smoke
        env:
          PYTHON_CMD: python

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: traffic_scene_validator/playwright-report/
          if-no-files-found: ignore
